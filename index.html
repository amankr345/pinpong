<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="scoreboard">
            <div class="score">
                <span class="label">Player</span>
                <span class="score-value" id="playerScore">0</span>
            </div>
            <div class="divider">|</div>
            <div class="score">
                <span class="label">Computer</span>
                <span class="score-value" id="computerScore">0</span>
            </div>
        </div>
        <canvas id="pongCanvas" width="800" height="400"></canvas>
        <div class="instructions">
            <p><strong>Controls:</strong> Mouse Y position or Arrow Keys (↑/↓) to move left paddle</p>
            <p><strong>First to 11 points wins!</strong></p>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
